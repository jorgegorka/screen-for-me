<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture</title>
    <link rel="stylesheet" href="/src/overlay/overlay.css" />
    <script type="module" src="/src/overlay/main.ts" defer></script>
  </head>
  <body>
    <div id="overlay-card" class="card hidden">
      <button id="dismiss" class="dismiss" title="Dismiss">✕</button>
      <div class="thumb-wrap">
        <img id="thumb" alt="Latest capture" draggable="false" />
        <span id="stack-badge" class="badge hidden"></span>
      </div>
      <div class="actions">
        <button id="copy" title="Copy to clipboard">Copy</button>
        <button id="save" title="Save as…">Save</button>
        <button id="annotate" title="Annotate">Annotate</button>
        <button id="reveal" title="Show in Finder">Finder</button>
      </div>
      <div id="toast" class="toast hidden"></div>
    </div>
  </body>
</html>
