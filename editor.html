<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="editor.title">Annotate</title>
    <link rel="stylesheet" href="/src/editor/editor.css" />
    <script type="module" src="/src/editor/main.ts" defer></script>
  </head>
  <body>
    <header id="toolbar">
      <div class="group" id="tools">
        <button data-tool="select" title="Select / move (V)" data-i18n="editor.select" data-i18n-title="editor.select_tooltip">Select</button>
        <button data-tool="arrow" title="Arrow (A)" data-i18n="editor.arrow" data-i18n-title="editor.arrow_tooltip">Arrow</button>
        <button data-tool="rect" title="Rectangle (R)" data-i18n="editor.rect" data-i18n-title="editor.rect_tooltip">Rect</button>
        <button data-tool="ellipse" title="Ellipse (E)" data-i18n="editor.ellipse" data-i18n-title="editor.ellipse_tooltip">Ellipse</button>
        <button data-tool="line" title="Line (L)" data-i18n="editor.line" data-i18n-title="editor.line_tooltip">Line</button>
        <button data-tool="pen" title="Freehand pen (P)" data-i18n="editor.pen" data-i18n-title="editor.pen_tooltip">Pen</button>
        <button data-tool="highlight" title="Highlighter (H)" data-i18n="editor.highlight" data-i18n-title="editor.highlight_tooltip">Highlight</button>
        <button data-tool="text" title="Text (T)" data-i18n="editor.text" data-i18n-title="editor.text_tooltip">Text</button>
        <button data-tool="counter" title="Counter badge (N)" data-i18n="editor.counter" data-i18n-title="editor.counter_tooltip">Counter</button>
        <button data-tool="pixelate" title="Pixelate region (B)" data-i18n="editor.pixelate" data-i18n-title="editor.pixelate_tooltip">Pixelate</button>
        <button data-tool="crop" title="Crop (C)" data-i18n="editor.crop" data-i18n-title="editor.crop_tooltip">Crop</button>
      </div>
      <div class="group" id="style-controls">
        <div id="colors"></div>
        <input
          id="stroke-width"
          type="range"
          min="1"
          max="16"
          value="4"
          title="Stroke width"
          data-i18n-title="editor.stroke_width_tooltip"
        />
      </div>
      <div class="group">
        <button id="undo" title="Undo (⌘Z)" data-i18n-title="editor.undo_tooltip">↩</button>
        <button id="redo" title="Redo (⇧⌘Z)" data-i18n-title="editor.redo_tooltip">↪</button>
        <button id="reset-crop" class="hidden" title="Remove crop" data-i18n="editor.uncrop" data-i18n-title="editor.uncrop_tooltip">Uncrop</button>
      </div>
      <div class="group crop-confirm hidden" id="crop-confirm">
        <button id="crop-apply" data-i18n="editor.crop_apply">Apply crop</button>
        <button id="crop-cancel" data-i18n="editor.crop_cancel">Cancel</button>
      </div>
      <div class="group right">
        <button id="copy" title="Copy annotated image" data-i18n="editor.copy" data-i18n-title="editor.copy_tooltip">Copy</button>
        <button id="save" title="Save annotated image as…" data-i18n="editor.save" data-i18n-title="editor.save_tooltip">Save</button>
        <button id="done" title="Save into capture and close" data-i18n="editor.done" data-i18n-title="editor.done_tooltip">Done</button>
      </div>
    </header>
    <main id="canvas-scroll">
      <div id="stage-holder"></div>
    </main>
    <div id="error-bar" class="hidden"></div>
  </body>
</html>
